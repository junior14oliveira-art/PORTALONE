[build]
  command = "npm run build"
  publish = ".next"
  base = "apps/admin"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Headers de segurança reforçados (admin é área crítica)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Frame-Options = "DENY"

# IMPORTANTE: No painel do Netlify, ative o "Password Protection" (Site Configuration > Visitors Access)
# para proteger o acesso ao painel administrativo com usuário e senha.
# Isso adiciona uma camada básica de autenticação antes mesmo de carregar o Next.js.
